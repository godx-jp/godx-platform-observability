# All-in-one flavour — wraps upstream grafana/otel-lgtm.
#
# Use ONLY for dev / CI / demo. Production must use the multi-container stack
# (compose/docker-compose.yml) or Helm charts (helm/).

name: observability-lite

networks:
  default:
    name: ${OBS_NETWORK:-observability}
    external: ${OBS_NETWORK_EXTERNAL:-false}

volumes:
  otel_lgtm_data:

services:
  otel-lgtm:
    image: ${OTEL_LGTM_IMAGE:-grafana/otel-lgtm:0.8.5}
    container_name: obs-otel-lgtm
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
      - "${OTLP_GRPC_HOST_PORT:-4317}:4317"
      - "${OTLP_HTTP_HOST_PORT:-4318}:4318"
    volumes:
      - otel_lgtm_data:/data

  # Optional: keep Promtail to ship Docker container logs of consumer projects.
  # Comment out if all consumers already push logs via OTLP.
  promtail:
    image: ${PROMTAIL_IMAGE:-grafana/promtail:3.3.0}
    container_name: obs-promtail-lite
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ../config/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - otel-lgtm
