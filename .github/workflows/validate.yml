name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: unit (static)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pipx install yamllint
      - name: Run unit tests
        run: make test-unit

  smoke:
    name: smoke (end-to-end)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - name: Run smoke tests
        run: make test-smoke-down
