server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Auto-discover all Docker containers via socket.
  # Apps opt-in to log collection by labeling their container with:
  #   observability.collect: "true"        (required to ship)
  #   observability.service: "<service>"   (becomes Loki label `service`)
  #   observability.env: "<env>"           (becomes Loki label `env`)
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["observability.collect=true"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      - source_labels: ['__meta_docker_container_label_observability_service']
        target_label: 'service'
      - source_labels: ['__meta_docker_container_label_observability_env']
        target_label: 'env'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'project'
    pipeline_stages:
      - docker: {}
      - json:
          expressions:
            level: level
            trace_id: trace_id
            span_id: span_id
            correlation_id: correlation_id
            msg: msg
      - labels:
          level:
      # trace_id / correlation_id intentionally NOT promoted to labels
      # (high cardinality). Available as structured metadata for queries.
