global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    deployment: ${DEPLOYMENT_ENV:-dev}

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: loki
    static_configs:
      - targets: ['loki:3100']

  - job_name: tempo
    static_configs:
      - targets: ['tempo:3200']

  - job_name: grafana
    static_configs:
      - targets: ['grafana:3000']

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8888']

  # ─── Consumer-supplied scrape jobs ───────────────────────────────
  # Drop YAML files into config/prometheus/scrape.d/*.yml — each file
  # is a list of static_configs, e.g.:
  #
  #   - targets: ['my-app:8080']
  #     labels:
  #       service: my-app
  #
  # Reload after edits: `make reload-prometheus`.
  - job_name: consumer-targets
    file_sd_configs:
      - files: ['/etc/prometheus/scrape.d/*.yml', '/etc/prometheus/scrape.d/*.yaml']
        refresh_interval: 30s
