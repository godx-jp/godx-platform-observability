name: Publish container images

# Builds the godx-observability component images (config baked in) and pushes
# them to GHCR on every semver tag, e.g. `git tag v1.0.0 && git push origin v1.0.0`.
#
# Each component is published independently:
#   ghcr.io/godx-jp/godx-platform-observability/otel-collector:1.0.0
#   ghcr.io/godx-jp/godx-platform-observability/grafana:1.0.0   ... etc.
#
# Consumers run the full stack straight from GHCR with compose/docker-compose.ghcr.yml
# (or the Helm chart) — no repo checkout or config mounts needed. Set each package's
# visibility to Public once, under the repo's Packages settings, after the first push.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        component:
          - otel-collector
          - loki
          - promtail
          - prometheus
          - tempo
          - grafana
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.component }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/${{ matrix.component }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
          provenance: false
