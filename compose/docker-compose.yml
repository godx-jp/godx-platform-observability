# godx-platform-observability — full LGTM + OpenTelemetry Collector
#
# Apps emit OTLP → otel-collector → Loki / Prometheus / Tempo → Grafana.
# Consumers attach to network "${OBS_NETWORK}" (default: observability).
#
# Override per environment via .env (image pins, ports, retention).

name: observability

networks:
  default:
    name: ${OBS_NETWORK:-observability}
    external: ${OBS_NETWORK_EXTERNAL:-false}

volumes:
  loki_data:
  prometheus_data:
  tempo_data:
  grafana_data:

services:
  # ─────────────────────────────────────────────────────────────────
  # OpenTelemetry Collector — single OTLP ingress for all apps
  # ─────────────────────────────────────────────────────────────────
  otel-collector:
    image: ${OTELCOL_IMAGE:-otel/opentelemetry-collector-contrib:0.115.1}
    container_name: obs-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    environment:
      DEPLOYMENT_ENV: ${DEPLOYMENT_ENV:-dev}
    volumes:
      - ../config/otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "${OTLP_GRPC_HOST_PORT:-4317}:4317"   # OTLP gRPC
      - "${OTLP_HTTP_HOST_PORT:-4318}:4318"   # OTLP HTTP
    depends_on:
      - loki
      - tempo
      - prometheus
    labels:
      observability.role: gateway

  # ─────────────────────────────────────────────────────────────────
  # Loki — logs
  # ─────────────────────────────────────────────────────────────────
  loki:
    image: ${LOKI_IMAGE:-grafana/loki:3.3.0}
    container_name: obs-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml -config.expand-env=true
    environment:
      LOKI_RETENTION: ${LOKI_RETENTION:-720h}
    volumes:
      - ../config/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    labels:
      observability.role: backend
      observability.signal: logs

  # ─────────────────────────────────────────────────────────────────
  # Promtail — Docker container log shipper (optional, OTLP logs preferred long term)
  # ─────────────────────────────────────────────────────────────────
  promtail:
    image: ${PROMTAIL_IMAGE:-grafana/promtail:3.3.0}
    container_name: obs-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ../config/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - loki
    labels:
      observability.role: collector
      observability.signal: logs

  # ─────────────────────────────────────────────────────────────────
  # Prometheus — metrics scrape + storage
  # ─────────────────────────────────────────────────────────────────
  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v2.55.1}
    container_name: obs-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROM_RETENTION:-30d}"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ../config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../config/prometheus/scrape.d:/etc/prometheus/scrape.d:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROM_HOST_PORT:-9090}:9090"
    labels:
      observability.role: backend
      observability.signal: metrics

  # ─────────────────────────────────────────────────────────────────
  # Tempo — distributed traces
  # ─────────────────────────────────────────────────────────────────
  tempo:
    image: ${TEMPO_IMAGE:-grafana/tempo:2.6.1}
    container_name: obs-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yml", "-target=all"]
    user: "0"
    volumes:
      - ../config/tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo_data:/var/tempo
    labels:
      observability.role: backend
      observability.signal: traces

  # ─────────────────────────────────────────────────────────────────
  # Grafana — UI, dashboards, alerts
  # ─────────────────────────────────────────────────────────────────
  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:11.4.0}
    container_name: obs-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000/}
      GF_AUTH_ANONYMOUS_ENABLED: ${GRAFANA_ANONYMOUS_ENABLED:-false}
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_INSTALL_PLUGINS: ""
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - ../config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    depends_on:
      - loki
      - prometheus
      - tempo
    labels:
      observability.role: ui
