# godx-platform-observability — run the full LGTM + OTel stack straight from GHCR.
#
# Config and dashboards are baked into each image, so NO repo checkout or config
# bind-mounts are required. This is the "pull and run" production-grade flavour.
#
#   OBS_VERSION=1.0.0 docker compose -f compose/docker-compose.ghcr.yml up -d
#
# Override image tags with OBS_VERSION (default: latest). Apps emit OTLP to
# :4317 / :4318; open Grafana at :3000.

name: observability

networks:
  default:
    name: ${OBS_NETWORK:-observability}
    external: ${OBS_NETWORK_EXTERNAL:-false}

volumes:
  loki_data:
  prometheus_data:
  tempo_data:
  grafana_data:

services:
  otel-collector:
    image: ghcr.io/godx-jp/godx-platform-observability/otel-collector:${OBS_VERSION:-latest}
    container_name: obs-otel-collector
    restart: unless-stopped
    environment:
      DEPLOYMENT_ENV: ${DEPLOYMENT_ENV:-dev}
    ports:
      - "${OTLP_GRPC_HOST_PORT:-4317}:4317"
      - "${OTLP_HTTP_HOST_PORT:-4318}:4318"
    depends_on:
      - loki
      - tempo
      - prometheus
    labels:
      observability.role: gateway

  loki:
    image: ghcr.io/godx-jp/godx-platform-observability/loki:${OBS_VERSION:-latest}
    container_name: obs-loki
    restart: unless-stopped
    environment:
      LOKI_RETENTION: ${LOKI_RETENTION:-720h}
    volumes:
      - loki_data:/loki
    labels:
      observability.role: backend
      observability.signal: logs

  promtail:
    image: ghcr.io/godx-jp/godx-platform-observability/promtail:${OBS_VERSION:-latest}
    container_name: obs-promtail
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - loki
    labels:
      observability.role: collector
      observability.signal: logs

  prometheus:
    image: ghcr.io/godx-jp/godx-platform-observability/prometheus:${OBS_VERSION:-latest}
    container_name: obs-prometheus
    restart: unless-stopped
    volumes:
      - prometheus_data:/prometheus
    ports:
      - "${PROM_HOST_PORT:-9090}:9090"
    labels:
      observability.role: backend
      observability.signal: metrics

  tempo:
    image: ghcr.io/godx-jp/godx-platform-observability/tempo:${OBS_VERSION:-latest}
    container_name: obs-tempo
    restart: unless-stopped
    user: "0"
    volumes:
      - tempo_data:/var/tempo
    labels:
      observability.role: backend
      observability.signal: traces

  grafana:
    image: ghcr.io/godx-jp/godx-platform-observability/grafana:${OBS_VERSION:-latest}
    container_name: obs-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000/}
      GF_AUTH_ANONYMOUS_ENABLED: ${GRAFANA_ANONYMOUS_ENABLED:-false}
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    depends_on:
      - loki
      - prometheus
      - tempo
    labels:
      observability.role: ui
